syntax = "proto3";

package store.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "identity/v1/permission.proto";
import "identity/v1/user.proto";

message Address {
  string street = 1;
  string city = 2;
  string region = 3;
  string postal_code = 4;
  string country = 5;
}

// Stores are used to store products.
// Note: A store is not always a shop.
message Store {
  // The unique identifier of the store.
  optional string ref_id = 1;

  // The name of the store.
  string name = 3;

  // The description of the store.
  optional string description = 5;

  // The id of the media of the logo of the store.
  optional string logo_link_id = 6;

  // The list of external links of the store it can be an address link, a phone number, an email, a website etc.
  optional string external_links_ids = 7;

  // The id of the business of the store.
  string business_id = 8;

  // The date and time the store was created.
  google.protobuf.Timestamp created_at = 9;

  // The date and time the store was last updated.
  optional google.protobuf.Timestamp updated_at = 10;

  // The business contact information.
  optional string phone = 11;

  // The business address.
  optional Address address = 12;

  // The business email.
  optional string email = 13;

  // The costing method of the store.
  optional StoreCostingMethod costing_method = 14;

  // The tax of the store.
  optional double tax = 15;

  // The postal box of the store.
  optional string postal_box = 16;

  // The nui of the store.
  optional string nui = 17;

  // The tax payer number of the store.
  optional string tax_payer_number = 18;
}

enum StoreCostingMethod {
  STORE_COSTING_METHOD_UNSPECIFIED = 0;
  /// The store uses the FIFO method.
  STORE_COSTING_METHOD_FIFO = 1;
  /// The store uses the Average method.
  STORE_COSTING_METHOD_AVERAGE = 2;
}

enum StoreMemberStatus {
  STORE_MEMBER_STATUS_UNSPECIFIED = 0;
  STORE_MEMBER_STATUS_ACTIVE = 1;
  STORE_MEMBER_STATUS_PENDING = 2;
  STORE_MEMBER_STATUS_INACTIVE = 3;
  STORE_MEMBER_STATUS_BANNED = 4;
  STORE_MEMBER_STATUS_REJECTED = 5; // ← user declined the invitation
  STORE_MEMBER_STATUS_EXPIRED = 6; // ← invitation token expired
}

enum OnboardingType {
  ONBOARDING_TYPE_UNSPECIFIED = 0;
  // admin created with password → active immediately
  ONBOARDING_TYPE_DIRECT = 1;
  // invitation email sent → user sets own password
  ONBOARDING_TYPE_INVITE = 2;
}

message StoreMember {
  string user_id = 1;
  string store_id = 2;
  identity.v1.StorePermissions permissions = 3;
  google.protobuf.Timestamp member_since = 4;
  StoreMemberStatus status = 5;
  OnboardingType onboarding_type = 6;
  // Null if DIRECT
  optional string invitation_id = 7;
}

message CreateStoreRequest {
  // The store information to create.
  Store store = 1;

  // The raw image of the logo of the store.
  optional bytes logo_raw_image = 2;
}

message CreateStoreResponse {
  // The unique identifier of the created store.
  string store_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 3
  ];
}

message DeleteStoreRequest {
  // The unique identifier of the store to delete.
  string store_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 3
  ];
}

message DeleteStoreResponse {
  // Whether the store was successfully deleted.
  bool success = 1;
}

service StoreService {
  // Creates a new store.
  rpc CreateStore(CreateStoreRequest) returns (CreateStoreResponse) {}

  // Deletes a store.
  rpc DeleteStore(DeleteStoreRequest) returns (DeleteStoreResponse) {}
}
